# =============================================================================
# order-service Deployment — INTENTIONALLY MISCONFIGURED
#
# Vulnerabilities:
#   [VULN-01] privileged: true
#   [VULN-02] runAsUser: 0 (root)
#   [VULN-03] Added dangerous Linux capabilities: SYS_ADMIN, NET_ADMIN, SYS_PTRACE
#              SYS_ADMIN ≈ root on the host. SYS_PTRACE allows attaching to any process.
#   [VULN-04] cluster-admin ServiceAccount
#   [VULN-05] No resource limits
#   [VULN-06] image: latest tag
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: secureflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      serviceAccountName: secureflow-sa   # [VULN-04]
      containers:
        - name: order-service
          image: secureflow/order-service:latest   # [VULN-06]
          securityContext:
            privileged: true                       # [VULN-01]
            runAsUser: 0                           # [VULN-02]
            allowPrivilegeEscalation: true
            capabilities:
              add:                                 # [VULN-03]
                - SYS_ADMIN
                - NET_ADMIN
                - SYS_PTRACE
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_HOST
              value: "postgres"
          # [VULN-05] No resource limits
