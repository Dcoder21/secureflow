# ─────────────────────────────────────────────────────────────
# SecureFlow — Hardened Auth Service Deployment
# This version uses Vault Agent Injector for secrets
# and has full security context applied.
#
# Compare with base/auth-service/deployment.yaml to see
# the before/after improvement.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  namespace: secureflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: secureflow
  labels:
    app: auth-service
    team: platform
    version: hardened
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        team: platform
      annotations:
        # ─── Vault Agent Injector Annotations ───
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-service"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/auth-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secureflow/data/auth-service" -}}
          export DB_HOST="{{ .Data.data.db_host }}"
          export DB_PORT="{{ .Data.data.db_port }}"
          export DB_USER="{{ .Data.data.db_user }}"
          export DB_PASSWORD="{{ .Data.data.db_password }}"
          export DB_NAME="{{ .Data.data.db_name }}"
          export SECRET_KEY="{{ .Data.data.secret_key }}"
          {{- end }}
    spec:
      serviceAccountName: auth-service-sa
      # ─── Security Context (Pod Level) ───
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: auth-service
          image: secureflow/auth-service:abc123def  # Pinned to specific SHA
          ports:
            - containerPort: 5001
          # ─── Security Context (Container Level) ───
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # ─── Resource Limits ───
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          # ─── No hardcoded env vars — secrets come from Vault ───
          env:
            - name: FLASK_DEBUG
              value: "0"
            - name: FLASK_ENV
              value: "production"
          # ─── Health Checks ───
          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          # ─── Writable tmp for Flask (readOnlyRootFilesystem) ───
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "64Mi"
