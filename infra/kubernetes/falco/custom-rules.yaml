# ─────────────────────────────────────────────────────────────
# SecureFlow — Custom Falco Rules
# Runtime threat detection for the banking platform
# ─────────────────────────────────────────────────────────────

# ─────────────────────────────────────────
# 1. Shell spawned inside any container
# ─────────────────────────────────────────
- rule: Shell Spawned in SecureFlow Container
  desc: >
    Detect when a shell is spawned inside any SecureFlow container.
    This is a strong indicator of compromise or unauthorized access.
  condition: >
    spawned_process
    and container
    and k8s.ns.name = "secureflow"
    and proc.name in (bash, sh, dash, zsh, csh, ksh)
  output: >
    Shell spawned in SecureFlow container
    (user=%user.name command=%proc.cmdline container=%container.name
    pod=%k8s.pod.name namespace=%k8s.ns.name image=%container.image.repository)
  priority: WARNING
  tags: [shell, secureflow, mitre_execution]

# ─────────────────────────────────────────
# 2. Sensitive file access
# ─────────────────────────────────────────
- rule: Sensitive File Read in SecureFlow
  desc: >
    Detect reads to sensitive files like /etc/shadow or /etc/passwd
    within SecureFlow containers.
  condition: >
    open_read
    and container
    and k8s.ns.name = "secureflow"
    and (fd.name startswith /etc/shadow or fd.name startswith /etc/passwd)
  output: >
    Sensitive file read in SecureFlow container
    (file=%fd.name user=%user.name command=%proc.cmdline
    container=%container.name pod=%k8s.pod.name)
  priority: WARNING
  tags: [filesystem, secureflow, mitre_credential_access]

# ─────────────────────────────────────────
# 3. Unexpected outbound connection
# ─────────────────────────────────────────
- rule: Unexpected Outbound Connection from SecureFlow
  desc: >
    Detect outbound network connections from SecureFlow containers
    to destinations outside the cluster. Backend services should
    only communicate internally.
  condition: >
    outbound
    and container
    and k8s.ns.name = "secureflow"
    and k8s.pod.name contains "auth-service" or k8s.pod.name contains "transaction-service"
    and not (fd.sip.name startswith "10." or fd.sip.name startswith "172.")
  output: >
    Unexpected outbound connection from backend service
    (connection=%fd.name command=%proc.cmdline container=%container.name
    pod=%k8s.pod.name destination=%fd.sip.name:%fd.sport)
  priority: NOTICE
  tags: [network, secureflow, mitre_exfiltration]

# ─────────────────────────────────────────
# 4. Binary executed from /tmp
# ─────────────────────────────────────────
- rule: Binary Run from Temp Directory in SecureFlow
  desc: >
    Detect execution of binaries from /tmp or /var/tmp.
    Attackers often download and execute payloads in temp directories.
  condition: >
    spawned_process
    and container
    and k8s.ns.name = "secureflow"
    and (proc.exepath startswith /tmp/ or proc.exepath startswith /var/tmp/)
  output: >
    Binary executed from temp directory
    (binary=%proc.exepath user=%user.name command=%proc.cmdline
    container=%container.name pod=%k8s.pod.name)
  priority: CRITICAL
  tags: [process, secureflow, mitre_execution]

# ─────────────────────────────────────────
# 5. Package manager executed (supply chain risk)
# ─────────────────────────────────────────
- rule: Package Manager Run in SecureFlow Container
  desc: >
    Detect package manager execution in running containers.
    Packages should only be installed during image build, not at runtime.
  condition: >
    spawned_process
    and container
    and k8s.ns.name = "secureflow"
    and proc.name in (apt, apt-get, yum, pip, pip3, npm, curl, wget)
  output: >
    Package manager or download tool executed at runtime
    (command=%proc.cmdline user=%user.name container=%container.name
    pod=%k8s.pod.name image=%container.image.repository)
  priority: WARNING
  tags: [process, secureflow, mitre_persistence]

# ─────────────────────────────────────────
# 6. Database credential file access
# ─────────────────────────────────────────
- rule: Database Credential Access in SecureFlow
  desc: >
    Detect access to files that may contain database credentials
    outside of normal application startup.
  condition: >
    open_read
    and container
    and k8s.ns.name = "secureflow"
    and (fd.name contains ".env" or fd.name contains "credentials" or fd.name contains "secrets")
    and not proc.name in (python, python3, gunicorn, node)
  output: >
    Credential file accessed by unexpected process
    (file=%fd.name process=%proc.name user=%user.name
    container=%container.name pod=%k8s.pod.name)
  priority: WARNING
  tags: [filesystem, secureflow, mitre_credential_access]
