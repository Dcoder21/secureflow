apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: secureflow
  labels:
    app: postgres
    team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:14
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres       # VULNERABILITY: weak default password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          # VULNERABILITY: No resource limits
      volumes:
        - name: pgdata
          emptyDir: {}              # VULNERABILITY: ephemeral storage — data lost on restart
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: secureflow
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: secureflow
data:
  init.sql: |
    CREATE DATABASE secureflow_auth;
    CREATE DATABASE secureflow_transactions;
