apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: secureflow
  labels:
    app: auth-service
    team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # VULNERABILITY: No securityContext — runs as root
      # VULNERABILITY: No resource limits — could be abused for crypto mining
      containers:
        - name: auth-service
          image: secureflow/auth-service:latest  # VULNERABILITY: using :latest tag
          ports:
            - containerPort: 5001
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres        # VULNERABILITY: plaintext secret in manifest
            - name: DB_NAME
              value: secureflow_auth
            - name: SECRET_KEY
              value: super-secret-key-123  # VULNERABILITY: hardcoded JWT secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: secureflow
spec:
  selector:
    app: auth-service
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
