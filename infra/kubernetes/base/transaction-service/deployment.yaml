apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: secureflow
  labels:
    app: transaction-service
    team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-service
  template:
    metadata:
      labels:
        app: transaction-service
    spec:
      containers:
        - name: transaction-service
          image: secureflow/transaction-service:latest
          ports:
            - containerPort: 5002
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: secureflow_transactions
            - name: AUTH_SERVICE_URL
              value: http://auth-service:5001
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: secureflow
spec:
  selector:
    app: transaction-service
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP
