<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureFlow Bank</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
        h1 { color: #00d4aa; font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 40px; }
        .card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 32px; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; background: #0a0a1a; border: 1px solid #2a2a3e; border-radius: 8px; color: #fff; font-size: 1rem; }
        input:focus { outline: none; border-color: #00d4aa; }
        .btn { width: 100%; padding: 14px; background: #00d4aa; color: #0a0a1a; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #00b894; }
        .toggle { text-align: center; margin-top: 16px; color: #888; }
        .toggle a { color: #00d4aa; text-decoration: none; cursor: pointer; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
        .alert-error { background: #2d1b1b; border: 1px solid #e74c3c; color: #e74c3c; }
        .alert-success { background: #1b2d1b; border: 1px solid #00d4aa; color: #00d4aa; }
        .warning-banner { background: #2d2d1b; border: 1px solid #f39c12; padding: 12px; border-radius: 8px; margin-bottom: 20px; color: #f39c12; font-size: 0.85rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-banner">
            ⚠️ This is an intentionally vulnerable application for educational purposes only.
        </div>

        <h1>SecureFlow Bank</h1>
        <p class="subtitle">Modern banking, intentionally insecure.</p>

        <div id="alert" class="alert"></div>

        <!-- Login Form -->
        <div id="login-form" class="card">
            <h2 style="margin-bottom: 20px;">Sign In</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn" onclick="login()">Sign In</button>
            <div class="toggle">
                Don't have an account? <a onclick="showRegister()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="card" style="display: none;">
            <h2 style="margin-bottom: 20px;">Create Account</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Choose password">
            </div>
            <button class="btn" onclick="register()">Create Account</button>
            <div class="toggle">
                Already have an account? <a onclick="showLogin()">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.className = `alert alert-${type}`;
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showRegister() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();
                if (resp.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    showAlert(data.error || 'Login failed', 'error');
                }
            } catch (err) {
                showAlert('Connection error', 'error');
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                const resp = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await resp.json();
                if (resp.ok) {
                    showAlert('Account created! Please sign in.', 'success');
                    showLogin();
                } else {
                    showAlert(data.error || 'Registration failed', 'error');
                }
            } catch (err) {
                showAlert('Connection error', 'error');
            }
        }
    </script>
</body>
</html>
